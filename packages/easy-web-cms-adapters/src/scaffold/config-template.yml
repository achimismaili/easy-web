# Decap CMS config.yml — template for @itci/easy-web instances
#
# Tokens wrapped in {{...}} are replaced at generation time.
# Use generateDecapConfig() from @itci/easy-web-cms-adapters instead of
# editing this file manually.

backend:
  name: azure
  repo: {{ADO_ORG}}/{{ADO_PROJECT}}/{{ADO_REPO}}
  tenant_id: {{TENANT_ID}}
  app_id: {{APP_ID}}
  branch: {{BRANCH}}

media_folder: "src/assets/images"
public_folder: "../../assets/images"

collections:
  - label: "Blog ({{LOCALE}})"
    name: blog_{{LOCALE}}
    folder: "src/content/blog/{{LOCALE}}"
    create: true
    format: frontmatter
    fields:
      - { name: title,          label: Title,             widget: string }
      - { name: description,    label: Description,       widget: text }
      - { name: pubDate,        label: "Publish Date",    widget: datetime }
      - { name: draft,          label: Draft,             widget: boolean, default: false }
      - { name: locale,         label: Locale,            widget: hidden,  default: "{{LOCALE}}" }
      - { name: translationKey, label: "Translation Key", widget: string }
      - { name: heroImage,      label: "Hero Image",      widget: image,   required: false }

  - label: Pages
    name: pages
    folder: "src/content/pages"
    create: true
    format: frontmatter
    fields:
      - { name: title,          label: Title,             widget: string }
      - { name: description,    label: Description,       widget: text }
      - { name: locale,         label: Locale,            widget: select, options: [{{LOCALE_OPTIONS}}] }
      - { name: translationKey, label: "Translation Key", widget: string }

  - label: "Site Config"
    name: site_config
    files:
      - label: Company
        name: company
        file: "src/content/data/company.json"
        fields:
          - { name: companyName,  label: "Company Name",  widget: string }
          - { name: defaultTitle, label: "Default Title", widget: string }
          - { name: url,          label: URL,             widget: string }
