name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5
        with:
          version: 10.34.4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          # Do NOT add `registry-url:` here. setup-node would then write
          # `_authToken=${NODE_AUTH_TOKEN}` to .npmrc, npm treats that as
          # pre-configured auth and skips OIDC exchange — publish gets E404.

      - name: Upgrade npm to >= 11.5.1 for Trusted Publishing OIDC support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          version: pnpm changeset version
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
