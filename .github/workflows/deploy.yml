name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'apps/docs/**'
      - 'apps/showcase/**'
      - 'packages/**'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm --filter "@achimismaili/*" build

      - name: Build docs
        run: pnpm --filter docs build

      - name: Build showcase
        run: pnpm --filter showcase build

      - name: Merge artifacts
        run: |
          mkdir -p combined
          cp -r apps/showcase/dist/. combined/
          cp -r apps/docs/dist/. combined/docs/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: combined

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
