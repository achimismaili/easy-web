trigger:
  branches:
    include:
      - main
  tags:
    include:
      - v*

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

stages:
  - stage: Build
    jobs:
      - job: Build
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '22.12.0'
          - script: npm install -g pnpm
            displayName: Install pnpm
          - script: pnpm install --frozen-lockfile
            displayName: Install dependencies
          - script: pnpm lint
            displayName: Lint
          - script: pnpm typecheck
            displayName: Typecheck
          - script: pnpm test
            displayName: Test
          - script: pnpm build
            displayName: Build
          - publish: packages
            artifact: packages-dist

  - stage: Publish
    dependsOn: Build
    condition: and(succeeded(), or(startsWith(variables['Build.SourceBranch'], 'refs/tags/v'), contains(variables['Build.SourceVersionMessage'], 'chore(release):')))
    jobs:
      - job: Publish
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '22.12.0'
          - script: npm install -g pnpm
            displayName: Install pnpm
          - script: pnpm install --frozen-lockfile
            displayName: Install dependencies
          - script: pnpm build
            displayName: Build
          - task: npmAuthenticate@0
            inputs:
              workingFile: .npmrc
          - script: pnpm -r publish --no-git-checks --access restricted --tag latest
            displayName: Publish packages
